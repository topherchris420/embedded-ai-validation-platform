; PlatformIO Project Configuration
; See https://docs.platformio.org/page/projectconf.html
;
; Adding a board = adding one [env:<name>] section with the right platform/
; board pair and an EAIV_BOARD_NAME flag. The application code only depends
; on the Arduino core plus the headers in include/eaiv/.

[platformio]
default_envs = esp32

[env]
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra

[env:esp32]
platform = espressif32
board = esp32dev
board_build.f_cpu = 240000000L
build_flags =
    ${env.build_flags}
    -DEAIV_BOARD_NAME=\"esp32\"

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.f_cpu = 240000000L
build_flags =
    ${env.build_flags}
    -DEAIV_BOARD_NAME=\"esp32-s3\"

[env:stm32h7]
platform = ststm32
board = nucleo_h743zi
build_flags =
    ${env.build_flags}
    -DEAIV_BOARD_NAME=\"stm32h743\"

[env:pico]
platform = raspberrypi
board = pico
board_build.f_cpu = 133000000L
build_flags =
    ${env.build_flags}
    -DEAIV_BOARD_NAME=\"rpi-pico\"
