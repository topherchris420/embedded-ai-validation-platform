name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package with dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Ruff
        run: ruff check .

      - name: Check Black formatting
        run: black --check .

      - name: Check types (mypy)
        run: mypy src/eaiv

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=src/eaiv --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
        if: success()

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package
        run: pip install -e .

      - name: Run integration tests
        run: |
          python -c "from eaiv import Orchestrator, load_config"
          python -c "from eaiv.targets import build_target"

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate documentation links
        run: python ci/check_docs.py

  benchmark-report:
    name: Benchmark Report (simulated)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package
        run: pip install -e .

      - name: Validate committed datasets
        run: eaiv datasets validate datasets/

      - name: Run all suites against the simulated target
        run: eaiv run --config configs/sim.yaml --suite all --report-dir reports

      - name: Publish report to job summary
        run: cat reports/report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/

  notify:
    name: Notify
    needs: [lint, test, test-integration, docs, benchmark-report]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration: ${{ needs.test-integration.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docs: ${{ needs.docs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Benchmark report: ${{ needs.benchmark-report.result }}" >> $GITHUB_STEP_SUMMARY